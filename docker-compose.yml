services:
  # 1. The Semantic Memory (Fast Cache)
  redis:
    image: redis:7-alpine
    container_name: aetheros-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # 2. The Deep Knowledge (Vector DB)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aetheros-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  redis_data:
